# 依赖安全可见性（B8·2026-07-19）：npm workspaces 原生支持——单一根目录条目
# （directory: "/"）自动扫描全部 package.json（root + packages/* + rewrite/*，
# 共 11 个；rewrite/mp 无 package.json，非 workspace 成员，天然不缺口），
# 无需逐目录列举。minor/patch 打包成一个 PR 降噪；major 刻意不分组，各自独立
# PR 逐个人工审 breaking change。第二条 github-actions 生态覆盖 ci.yml 里
# actions/checkout、actions/setup-node 等版本更新。
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
