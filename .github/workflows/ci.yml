# CI 质量闸：每个 PR（和合并进 main 时）自动跑全套 `npm run check`。
# 结果显示在 PR 页面底部——绿勾 = 机器检查通过，红叉 = 有问题先别合并。
# 三道闸单一定义：本 CI = 本地 pre-commit = 编辑 hook，全部以 `npm run check` 为唯一定义
# （check = structure + typecheck + lint + test），由 check:structure 的
# gate-single-source 不变量守护，防三闸漂移。
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Node 20（与本地开发版本一致）
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      # 依赖安全审计（B8·2026-07-19 快照·报告模式·不阻断合并）：本地
      # `npm audit --omit=dev` 实测 40 条既有告警（13 high / 14 moderate /
      # 13 low，0 critical，advisory DB 持续更新会漂移，实跑数字以当次为准）。
      # 非 --force 的 `npm audit fix` 只能修 1 个 moderate（postcss），13 条
      # high 全部需要 --force（breaking：@dcloudio/uni-mp-weixin 等间接依赖），
      # 故本批不设 blocking——先接可见性，把存量摆到明处。升级 blocking 前置：
      # ① 逐条核对 breaking change 面后清存量，或 ② 显式接受风险记账后再摘
      # continue-on-error（见 docs/待办与债.md）。守卫 ci-audit-step-present
      # 钉住这一步不被静默摘除（不评判闸门严格度，只保证步骤在位）。
      - name: 依赖安全审计（npm audit，报告模式·不阻断合并）
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

      - name: 质量闸（structure + typecheck + lint + test）
        run: npm run check

      # 产物闸（盲区体检批4·根因#8「构建过≠真能用」部署产物层镜像）：真实构建四个生产产物 +
      # 活线云函数产物 require 进来真跑（加载面+网关 fail-closed 冒烟）。此前三道闸从不构建任何
      # 真实产物——esbuild external 错/摇树误删这类问题在 check 全绿下直接流入生产。
      # CI-only 硬化层（vite/astro 构建分钟级·不进 pre-commit）；守卫 rw-artifact-gate-in-ci 钉接线。
      - name: 产物闸（build rw-cloud/admin/agent/site + 产物行为验证）
        run: npm run check:artifacts
