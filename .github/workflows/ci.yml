# CI 质量闸：每个 PR（和合并进 main 时）自动跑全套 `npm run check`。
# 结果显示在 PR 页面底部——绿勾 = 机器检查通过，红叉 = 有问题先别合并。
# 三道闸单一定义：本 CI = 本地 pre-commit = 编辑 hook，全部以 `npm run check` 为唯一定义
# （check = conventions + structure + typecheck + lint + test），由 check:structure 的
# gate-single-source 不变量守护，防三闸漂移。
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node 20（与本地开发版本一致）
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 质量闸（conventions + structure + typecheck + lint + test）
        run: npm run check

      # 产物闸（盲区体检批4·根因#8「构建过≠真能用」部署产物层镜像）：真实构建四个生产产物 +
      # 活线云函数产物 require 进来真跑（加载面+网关 fail-closed 冒烟）。此前三道闸从不构建任何
      # 真实产物——esbuild external 错/摇树误删这类问题在 check 全绿下直接流入生产。
      # CI-only 硬化层（vite/astro 构建分钟级·不进 pre-commit）；守卫 rw-artifact-gate-in-ci 钉接线。
      - name: 产物闸（build rw-cloud/admin/agent/site + 产物行为验证）
        run: npm run check:artifacts
